<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        function addToTextbox(text) {
            const textbox = document.querySelector('textarea');
            textbox.value += text + ' ';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Screener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-gray-900 to-black text-white min-h-screen flex flex-col">
    
    <nav class="flex justify-center space-x-16 py-4 bg-black text-white text-lg">
        <a href="#" class="hover:text-teal-400">About Us</a>
        <a href="#" class="hover:text-teal-400">Screener</a>
        <a href="#" class="hover:text-teal-400">Learn More</a>
        <a href="#" class="hover:text-teal-400">Blockchain</a>
    </nav>

    <div class="flex justify-center items-start flex-grow mt-10 space-x-10">
       
        <textarea class="bg-gray-200 text-black w-[28%] h-60 p-4 text-xl shadow-lg rounded-2xl text-center resize-none" placeholder="Type your Input here..."></textarea>

        
        <div class="grid grid-cols-3 gap-8 ml-10 mt-4">
    <button class="bg-green-500 rounded-2xl px-6 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('PE')">PE</button>
    <button class="bg-green-500 rounded-2xl px-6 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('EPS')">EPS</button>
    <button class="bg-green-500 rounded-2xl px-6 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('Quick Ratio')">Quick</button>
    <button class="bg-green-500 rounded-2xl px-6 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('Current Ratio')">Current</button>
    <button class="bg-green-500 rounded-2xl px-6 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('Market Cap')">Market Cap</button>
    <button class="bg-green-500 rounded-2xl px-6 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('Dividend Yield')">D/Y</button>
    <button class="bg-green-500 rounded-2xl px-6 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('ROE')">ROE</button>
    <button class="bg-green-500 rounded-2xl px-6 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('ROA')">ROA</button>
    <button class="bg-green-500 rounded-2xl px-6 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('DMA 50')">DMA 50</button>
    <button class="bg-green-500 rounded-2xl px-6 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('DMA 200')">DMA 200</button>
    <button class="bg-green-500 rounded-2xl px-6 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('Debt To Equity')">D2E</button>
    <button class="bg-green-500 rounded-2xl px-6 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('Net Profit')">Profit</button>
    <button class="bg-green-500 rounded-2xl px-6 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('52 Week High')">52H</button>
    <button class="bg-green-500 rounded-2xl px-6 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('52 Week Low')">52L</button>
    <button class="bg-green-500 rounded-2xl px-6 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('AND')">AND</button>
    
    
    
</div>

        
        <div class="flex flex-col space-y-6 ml-10">
    <button class="bg-green-500 rounded-[50px] px-8 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('PPS1')">Predefined Parameters Set 1</button>
    <button class="bg-green-500 rounded-[50px] px-8 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('PPS2')">Predefined Parameters Set 2</button>
    <button class="bg-green-500 rounded-[50px] px-8 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('PPS3')">Predefined Parameters Set 3</button>
    <button class="bg-green-500 rounded-[50px] px-8 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('PPS4')">Predefined Parameters Set 4</button>
    

</div>
<div class="grid grid-cols-3 gap-8 ml-10 mt-4">
    <button class="bg-green-500 rounded-2xl px-6 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('<')"><</button>
    <button class="bg-green-500 rounded-2xl px-6 py-3 hover:bg-green-600 shadow-md" onclick="addToTextbox('>')">></button>
</div>
    </div>

   
    <div class="flex justify-center mt-4 mb-4">
        <button class="bg-green-500 rounded-[50px] px-10 py-3 hover:bg-green-600 shadow-md">Run</button>
    </div>
</body>
</html>
