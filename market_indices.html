<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Indices Graphs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: linear-gradient(90deg, #020617, #002619);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .navbar {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            padding: 10px 30px;
            border-radius: 30px;
            display: flex;
            gap: 20px;
            z-index: 1000;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
        }

        .navbar a:hover {
            color: #ddd;
        }

        .container {
            padding-top: 90px;
            width: 90%;
            max-width: 1400px;
            margin: 0 auto;
        }

        .indices-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .index-frame {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 15px;
            border: 5px solid rgba(0, 255, 127, 0.5);
            width: 320px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0px 0px 10px rgba(0, 255, 127, 0.3);
        }

        .index-graph-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="#">About Us</a>
        <a href="#">Screener</a>
        <a href="#">Learn More</a>
        <a href="#">Blockchain</a>
    </div>

    <div class="container">
        <div class="indices-grid">
            <div class="index-frame">
                <div class="index-graph-container">
                    <img src="https://raw.githubusercontent.com/reverbounus/images/main/NIFTY_50.png" alt="NIFTY 50">
                </div>
            </div>
            <div class="index-frame">
                <div class="index-graph-container">
                    <img src="https://raw.githubusercontent.com/reverbounus/images/main/SENSEX.png" alt="SENSEX">
                </div>
            </div>
            <div class="index-frame">
                <div class="index-graph-container">
                    <img src="https://raw.githubusercontent.com/reverbounus/images/main/BANKNIFTY.png" alt="BANKNIFTY">
                </div>
            </div>
            <div class="index-frame">
                <div class="index-graph-container">
                    <img src="https://raw.githubusercontent.com/reverbounus/images/main/MIDCAP_150.png" alt="MIDCAP 150">
                </div>
            </div>
            <div class="index-frame">
                <div class="index-graph-container">
                    <img src="https://raw.githubusercontent.com/reverbounus/images/main/NIFTY_NEXT_50.png" alt="NIFTY NEXT 50">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
